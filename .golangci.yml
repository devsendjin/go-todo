# golangci-lint v2 — https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # CLI default; explicit so behavior is obvious in-repo
  default: standard

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      colors: true
